name: Scorecard security analysis
on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '30 1 * * 6' # Saturdays at 1:30 AM UTC

# Declare standard permissions for Security Scorecard
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the results to code-scanning dashboard.
      security-events: write
      # Needed to publish results and get a public badge.
      id-token: write

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # (Optional) Fine-grained personal access token key if using private repos,
          # but since it's a public repository we can rely on standard token.
          publish_results: true

      # Upload the results to GitHub's code scanning dashboard.
      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
