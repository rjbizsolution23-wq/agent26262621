version: 2
updates:
  # Maintain dependencies for npm (Cloudflare Worker & Dashboard assets)
  - package-ecosystem: "npm"
    directory: "/saso_dashboard"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "rjbizsolution23-wq"

  # Maintain dependencies for GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "rjbizsolution23-wq"
